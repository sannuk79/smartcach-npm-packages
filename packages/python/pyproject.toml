[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "smartcache"
version = "0.1.0"
description = "Universal Cache Management with LRU + TTL + Priority Eviction"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.8"
keywords = ["cache", "lru", "ttl", "memory", "eviction"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.8",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
]
dependencies = []

[project.optional-dependencies]
dev = ["pytest>=7.0", "black>=23.0", "mypy>=1.0"]
fastapi = ["fastapi>=0.100.0"]

[project.urls]
Homepage = "https://github.com/smartcache/smartcache"
Documentation = "https://github.com/smartcache/smartcache/docs"
